<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Job Match</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="fa-solid fa-robot"></i> AI Job Match
            </a>
        </div>
    </nav>

    <section class="hero-section d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="glass-card form-card p-5">
                        <h2 class="mb-4 text-center"><i class="fa-solid fa-user-plus"></i> Create Account</h2>

                        {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                {% for category, message in messages %}
                                    <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-dismissible fade show">
                                        {{ message }}
                                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <form method="POST">
                            <div class="mb-3">
                                <label class="form-label"><i class="fa-solid fa-user"></i> Full Name</label>
                                <input type="text" name="full_name" class="form-control" placeholder="John Doe" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="fa-solid fa-user-circle"></i> Username</label>
                                <input type="text" name="username" class="form-control" placeholder="johndoe" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="fa-solid fa-envelope"></i> Email</label>
                                <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
                                <input type="password" name="password" class="form-control" placeholder="At least 6 characters" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label"><i class="fa-solid fa-lock-open"></i> Confirm Password</label>
                                <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fa-solid fa-user-check"></i> Register
                            </button>
                        </form>

                        <p class="text-center text-muted">
                            Already have an account? <a href="{{ url_for('login') }}" class="text-primary">Login here</a>
                        </p>

                        <hr class="my-4">

                        <a href="{{ url_for('index') }}" class="btn btn-outline-light w-100">
                            <i class="fa-solid fa-arrow-left"></i> Back to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
